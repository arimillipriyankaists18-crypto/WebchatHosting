<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial, sans-serif; text-align: center; padding-top: 100px; background: #f4f4f4; }
h1 { font-size: 32px; }
p { font-size: 18px; }
#chatButton {
  position: fixed;
  bottom: 40px;
  right: 40px;
  background: #d4af37;
  color: #000;
  padding: 15px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>Test Chat</h1>
<p>For any queries click on the below chat button.</p>

<div id="chatButton">Chat Now</div>

<!-- ============================== -->
<!-- SALESFORCE EMBEDDED MESSAGING  -->
<!-- ============================== -->

<script type="text/javascript">
  // Wait until bootstrap is loaded
  function initEmbeddedMessaging() {
    try {
      embeddedservice_bootstrap.settings.language = 'en_US';

      // Hidden country field
      embeddedservice_bootstrap.settings.prechatFields = {
        Country__c: { value: "USA", isHidden: true }
      };

      embeddedservice_bootstrap.init(
        '00DgL00000MQZoi', // Org ID
        'Web_Messaging_Deployment', // Deployment Name
        'https://orgfarm-3599842067-dev-ed.develop.my.site.com/ESWWebMessagingDeployme1772185616824',
        { scrt2URL: 'https://orgfarm-3599842067-dev-ed.develop.my.salesforce-scrt.com' }
      );

    } catch(e) {
      console.error('Error initializing Embedded Messaging', e);
    }
  }

  // Attach chat button after bootstrap loads
  document.addEventListener("DOMContentLoaded", function() {
    var chatBtn = document.getElementById("chatButton");
    chatBtn.addEventListener("click", function() {
      if (embeddedservice_bootstrap && embeddedservice_bootstrap.startChat) {
        embeddedservice_bootstrap.startChat();
      } else {
        console.warn("Chat is not ready yet. Wait a few seconds and try again.");
      }
    });
  });
</script>

<script type="text/javascript" src="https://orgfarm-3599842067-dev-ed.develop.my.site.com/ESWWebMessagingDeployme1772185616824/assets/js/bootstrap.min.js" onload="initEmbeddedMessaging()"></script>

</body>
</html>
