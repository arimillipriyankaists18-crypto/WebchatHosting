<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Messaging Example</title>
</head>
<body>
    <h1>Salesforce Embedded Messaging Demo</h1>
    <p>The chat widget should appear in the corner once loaded.</p>

    <!-- Salesforce Embedded Messaging Script -->
    <script type="text/javascript">
        function initEmbeddedMessaging() {
            try {
                // Set language (en_US, en, etc.)
                embeddedservice_bootstrap.settings.language = 'en_US';

                // Initialize the embedded messaging
                embeddedservice_bootstrap.init(
                    '00DgL00000MQZoi', // Your org ID
                    'Web_Messaging_Deployment', // Deployment name
                    'https://orgfarm-3599842067-dev-ed.develop.my.site.com/ESWWebMessagingDeployme1772185616824', // URL to deployment
                    {
                        scrt2URL: 'https://orgfarm-3599842067-dev-ed.develop.my.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>

    <!-- Load the Salesforce bootstrap JS -->
    <script type="text/javascript" 
            src="https://orgfarm-3599842067-dev-ed.develop.my.site.com/ESWWebMessagingDeployme1772185616824/assets/js/bootstrap.min.js" 
            onload="initEmbeddedMessaging()">
    </script>
</body>
</html>
